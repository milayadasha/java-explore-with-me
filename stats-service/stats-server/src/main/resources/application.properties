ewm.date-time.pattern=yyyy-MM-dd HH:mm:ss
server.port=9090
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

#Logging
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.transaction.interceptor=TRACE
logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG
logging.level.ru.practicum.ewm.server=INFO
logging.file.name=ru.practicum.ewm.server.StatsServerApp.log

#Connection to Postgres DB
spring.datasource.driverClassName = org.postgresql.Driver
spring.datasource.url = jdbc:postgresql://localhost:5432/stats
spring.datasource.username = dbuser
spring.datasource.password = 12345

#Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration



